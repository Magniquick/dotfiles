repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: qmllint
        name: qmllint (qt6, fix all qml)
        entry: bash -lc 'managed/config/quickshell/tools/qmllint.sh --fix $(find . -name "*.qml")'
        language: system
        pass_filenames: false
