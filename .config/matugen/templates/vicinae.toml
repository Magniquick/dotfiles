# Matugen -> Vicinae
#
# Vicinae theme IDs come from the generated filename. This template is wired to
# ~/.local/share/vicinae/themes/matugen.toml, so the theme ID is "matugen".

[meta]
version = 1
name = "Matugen"
description = "Generated from the current Matugen Material You palette."
variant = "dark"

[colors.core]
background = "{{ colors.surface_container_low.default.hex }}"
foreground = "{{ colors.on_surface.default.hex }}"
secondary_background = "{{ colors.surface_container_lowest.default.hex }}"
border = "{{ colors.surface_container_highest.default.hex }}"
accent = "{{ colors.primary.default.hex }}"
accent_foreground = "{{ colors.on_primary.default.hex }}"

[colors.main_window]
border = "{{ colors.surface_container_highest.default.hex }}"
footer = { background = "{{ colors.surface_container_low.default.hex }}" }

[colors.settings_window]
border = "{{ colors.surface_container_highest.default.hex }}"

[colors.accents]
blue = "{{ colors.primary.default.hex }}"
green = "{{ colors.tertiary.default.hex }}"
magenta = "{{ colors.tertiary.default.hex }}"
orange = "{{ colors.secondary.default.hex }}"
purple = "{{ colors.primary.default.hex }}"
red = "{{ colors.error.default.hex }}"
yellow = "{{ colors.secondary.default.hex }}"
cyan = "{{ colors.tertiary.default.hex }}"

[colors.shortcut]
border = "{{ colors.surface_container_highest.default.hex }}"

[colors.text]
default = "{{ colors.on_surface.default.hex }}"
muted = "{{ colors.on_surface_variant.default.hex }}"
danger = "{{ colors.error.default.hex }}"
success = "{{ colors.tertiary.default.hex }}"
placeholder = "{{ colors.on_surface_variant.default.hex }}"
selection = { background = "{{ colors.primary.default.hex }}", foreground = "{{ colors.on_primary.default.hex }}" }

[colors.text.links]
default = "{{ colors.primary.default.hex }}"
visited = "{{ colors.tertiary.default.hex }}"

[colors.input]
border = "{{ colors.surface_container_highest.default.hex }}"
border_focus = "{{ colors.primary.default.hex }}"
border_error = "{{ colors.error.default.hex }}"

[colors.button.primary]
background = "{{ colors.surface_container_high.default.hex }}"
foreground = "{{ colors.on_surface.default.hex }}"
hover = { background = "{{ colors.surface_container_highest.default.hex }}" }
focus = { outline = "{{ colors.primary.default.hex }}" }

[colors.list.item.hover]
foreground = "{{ colors.on_surface.default.hex }}"
secondary_foreground = "{{ colors.on_surface_variant.default.hex }}"

[colors.list.item.selection]
background = "{{ colors.surface_container_high.default.hex }}"
foreground = "{{ colors.on_surface.default.hex }}"
secondary_background = "{{ colors.surface_container_highest.default.hex }}"
secondary_foreground = "{{ colors.on_surface_variant.default.hex }}"

[colors.grid.item]
background = "{{ colors.surface_container_lowest.default.hex }}"
hover = { outline = "{{ colors.primary.default.hex }}" }
selection = { outline = "{{ colors.primary.default.hex }}" }

[colors.scrollbars]
background = "{{ colors.surface_container_highest.default.hex }}"

[colors.loading]
bar = "{{ colors.primary.default.hex }}"
spinner = "{{ colors.primary.default.hex }}"
