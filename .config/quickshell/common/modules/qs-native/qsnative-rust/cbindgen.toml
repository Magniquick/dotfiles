language = "C++"
pragma_once = true
autogen_warning = "// Auto-generated by cbindgen from the Rust extern \"C\" surface. Do not edit; edit the Rust and rebuild."
documentation = true
documentation_style = "c99"
style = "both"

[parse]
parse_deps = false

[export]
# Only #[no_mangle] extern "C" fns and the types they reference are emitted.
# Opaque handle structs (not #[repr(C)]) become forward declarations.
